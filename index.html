<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Favicon is set dynamically via useDynamicSEO.js from the admin API; no hardcoded favicon here -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ── Primary SEO — overridden per-page by PageSEO.jsx (react-helmet-async) ── -->
  <!-- All values below are intentionally blank. PageSEO fills them from the admin API. -->
  <!-- Keeping them blank prevents JS-free crawlers from indexing stale/generic content. -->
  <title></title>
  <meta name="description" content="" />
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
  <!-- theme-color is set per-client via CSS / admin API — no hardcoded color here -->

  <!-- ── Open Graph fallback — filled by PageSEO.jsx ── -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="" />
  <meta property="og:description" content="" />

  <!-- ── Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
