<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Favicon is set dynamically via useDynamicSEO.js from the admin API; no hardcoded favicon here -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ── Primary SEO (overridden per-page by react-helmet-async) ── -->
  <title>Best Pizza Near Me | Order Online — Delivery & Pickup</title>
  <meta name="description" content="Order the best pizza online — tandoori pizza, shahi paneer pizza, signature pizzas, burgers & more. Fast delivery or pickup. Fresh, hot, delivered." />
  <meta name="keywords" content="best pizza near me, pizza near me, pizza delivery near me, tandoori pizza, shahi paneer pizza, best pizza in town, burger near me, Indian pizza, pizza online order, pizza pickup" />
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
  <meta name="theme-color" content="#238629" />

  <!-- ── Open Graph fallback ── -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Best Pizza Near Me | Order Online — Delivery & Pickup" />
  <meta property="og:description" content="Order the best pizza online — tandoori pizza, shahi paneer pizza, signature pizzas & more. Fast delivery or pickup." />

  <!-- ── Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
