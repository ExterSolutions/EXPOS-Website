<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
        SEO NOTE:
        All meta tags (title, description, og:*, twitter:*, favicon, JSON-LD)
        are injected DYNAMICALLY by React Helmet (PageSEO.jsx) from the admin API.
        Do NOT add static brand/identity values here — they will appear in Google
        for every client and cannot be overridden by a bot that doesn't run JS.
    -->

    <!-- Favicon placeholder — overridden at runtime by useDynamicSEO.js from admin -->
    <link id="dynamic-favicon" rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="/manifest.json">

    <!-- MS / Android theme colour — safe generic defaults -->
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-config" content="/browserconfig.xml">
    <meta name="theme-color" content="#ffffff">

    <!--
        Title & description placeholders — React Helmet replaces these on load.
        Kept intentionally blank so Google does not index stale brand content.
    -->
    <title>Loading…</title>
    <meta name="description" content="">

    <!-- Open Graph placeholders — filled by PageSEO.jsx -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="">
    <meta property="og:description" content="">
    <meta property="og:image" content="">
    <meta property="og:url" content="">

    <!-- Twitter Card placeholders — filled by PageSEO.jsx -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="">
    <meta property="twitter:description" content="">
    <meta property="twitter:image" content="">
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
